name: Build Windows x64 Installer

on:
  workflow_dispatch:

jobs:
  build-win-x64:
    runs-on: windows-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      NEXT_PUBLIC_DOMAIN_API_FULL: http://localhost:3000/
      NEXT_PUBLIC_API_PASS_AES: wdypm0808
      NEXT_PUBLIC_CHACE_TIME: "10"
      JWT_SECRET: widy2025#
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Windows installer (x64)
        run: npm run dist:win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anjungan-desa-win-x64
          path: |
            dist-electron/*.exe
            dist-electron/*.7z
            dist-electron/*.blockmap
            dist-electron/win-*/Anjungan Desa.exe
          if-no-files-found: error
